<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AMAC FR5 - 現地調査モバイル</title>
  
  <!-- CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); /* 屋外で見えやすい明るいスレートグレー */
      --glass-bg: rgba(255, 255, 255, 0.92); /* 高不透明度のホワイトグラス */
      --glass-border: rgba(15, 23, 42, 0.16); /* はっきりとしたスレート境界線 */
      --accent-color: #1e40af; /* 濃いブルー（最高コントラストのプライマリ） */
      --accent-success: #065f46; /* 視認性の高い濃いエメラルド（成功） */
      --accent-warning: #92400e; /* 視認性の高い濃いアンバー（警告） */
      --accent-danger: #991b1b; /* 視認性の高い濃いレッド（危険） */
      --text-main: #0f172a; /* ほぼ黒（最高コントラスト） */
      --text-muted: #334155; /* 濃いスレートグレー（サブテキスト） */
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', 'Noto Sans JP', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      font-size: 1.08rem; /* 屋外用の基本フォントサイズを底上げ */
    }

    /* ガラスモルフィズムスタイル（ライトテーマに最適化） */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid var(--glass-border); /* 視認性を上げるため境界線を太く */
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    /* ヘッダー */
    header {
      padding: 14px 18px;
      z-index: 1030;
      border-bottom: 2px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-size: 1.35rem; /* サイズ拡大 */
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(to right, #1e40af, #4338ca);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    /* メインコンテンツエリア */
    main {
      flex: 1;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 140px; /* ボトムバーからボタンを完全に浮かび上がらせるため余白を十分に確保 */
    }

    /* タブ切り替え制御 */
    .app-tab-content {
      display: none;
      width: 100%;
    }

    /* 地図タブだけは画面いっぱいに広げる必要があるため個別に100%を適用 */
    #tab-map.app-tab-content {
      height: 100%;
    }

    .app-tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* マップエリア */
    #map-container {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 135px);
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* マップ上のフローティングコントロール */
    .map-overlay-controls {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .map-btn {
      width: 50px; /* タップしやすくするため大きく */
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid var(--glass-border);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
      font-size: 1.25rem;
    }

    .map-btn:active {
      transform: scale(0.9);
      background: var(--accent-color);
      color: white;
    }

    .map-tracking-panel {
      position: absolute;
      bottom: 25px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      padding: 16px 20px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.22);
    }

    .map-tracking-panel span.small, .map-tracking-panel .text-secondary {
      font-size: 0.85rem !important; /* フォントサイズ拡大 */
      font-weight: 600;
    }

    /* ボトムナビゲーションバー */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px; /* やや高さを拡大 */
      background: rgba(255, 255, 255, 0.98); /* 白ベース */
      backdrop-filter: blur(20px);
      border-top: 2px solid var(--glass-border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1030;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
    }

    .nav-item-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem; /* サイズ拡大 */
      font-weight: 600; /* 太字 */
      padding: 8px 0;
      transition: all 0.2s;
    }

    .nav-item-btn i {
      font-size: 1.5rem; /* アイコンサイズ拡大 */
      margin-bottom: 5px;
      transition: all 0.2s;
    }

    .nav-item-btn.active {
      color: var(--accent-color);
      font-weight: 800;
    }

    .nav-item-btn.active i {
      transform: translateY(-2px);
      filter: drop-shadow(0 2px 4px rgba(30, 64, 175, 0.3));
    }

    /* ログインモーダル */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-card {
      max-width: 440px;
      width: 100%;
      padding: 35px;
      text-align: center;
      background: #ffffff;
      border: 3px solid var(--glass-border);
    }

    .login-card h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--accent-color);
    }

    /* カスタムフォームコントロール（高視認性） */
    .form-control, .form-select {
      background-color: #ffffff;
      border: 2px solid #94a3b8; /* 濃い境界線 */
      color: var(--text-main);
      border-radius: 10px;
      padding: 12px 16px; /* パディングを拡大 */
      font-size: 1.05rem; /* フォントサイズ拡大 */
      font-weight: 500;
    }

    .form-control:focus, .form-select:focus {
      background-color: #ffffff;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 0.25rem rgba(30, 64, 175, 0.25);
      color: var(--text-main);
    }

    .form-label {
      color: var(--text-main); /* 濃くする */
      font-weight: 700; /* ボールドに */
      font-size: 1.05rem; /* サイズ拡大 */
      margin-bottom: 8px;
    }

    /* 写真撮影エリア */
    .photo-capture-wrapper {
      border: 3px dashed #94a3b8; /* 太く */
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: #f8fafc;
      transition: all 0.3s;
    }

    .photo-capture-wrapper:hover {
      border-color: var(--accent-color);
      background: rgba(30, 64, 175, 0.05);
    }

    .photo-preview {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 10px;
      display: none;
      margin-top: 10px;
    }

    /* ボタンカスタマイズ（大きく、見やすく） */
    .btn-gradient-primary {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      color: white;
      border: none;
      font-weight: 700;
      padding: 14px 20px; /* パディング拡大 */
      font-size: 1.15rem; /* フォント拡大 */
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.25);
      transition: all 0.3s;
    }

    .btn-gradient-primary:hover {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(30, 64, 175, 0.35);
      color: white;
    }

    .btn-gradient-success {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      color: white;
      border: none;
      font-weight: 700;
      padding: 16px 24px;
      font-size: 1.2rem;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.25);
    }
    
    .btn-gradient-success:hover {
      background: linear-gradient(135deg, #047857 0%, #059669 100%);
      color: white;
    }

    /* カウンターバッジ */
    .badge-count {
      position: absolute;
      top: 5px;
      right: 25%;
      background: #dc2626; /* はっきりとした赤に変更 */
      color: #ffffff;
      font-weight: 800;
      font-size: 0.75rem;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid white;
    }

    /* 送信ローディング画面 */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 23, 42, 0.7);
      z-index: 3000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px);
    }

    .spinner-neon {
      width: 4rem;
      height: 4rem;
      border: 0.3em solid rgba(30, 64, 175, 0.2);
      border-left-color: var(--accent-color);
      border-radius: 50%;
      animation: spinner-border .75s linear infinite;
    }

    /* ステータスドット */
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      background-color: var(--text-muted);
    }
    
    .status-dot.active {
      background-color: #059669;
      box-shadow: 0 0 10px #059669;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    /* Leaflet コントロールカスタマイズ（大きく） */
    .leaflet-bar {
      border: 2px solid var(--glass-border) !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important;
      border-radius: 8px;
    }
    .leaflet-bar a {
      background-color: #ffffff !important;
      color: var(--text-main) !important;
      border-bottom: 2px solid var(--glass-border) !important;
      width: 44px !important;
      height: 44px !important;
      line-height: 44px !important;
      font-size: 1.3rem !important;
    }
    .leaflet-bar a:hover {
      background-color: #e2e8f0 !important;
      color: var(--accent-color) !important;
    }
    .leaflet-control-zoom-in, .leaflet-control-zoom-out {
      border-radius: 6px !important;
    }
  </style>
</head>
<body>

  <!-- 簡易ログインオーバーレイ -->
  <div id="login-overlay" class="login-overlay">
    <div class="glass-panel login-card">
      <div class="mb-4">
        <i class="fa-solid fa-map-location-dot fa-3x text-info"></i>
      </div>
      <h2>AMAC FR5</h2>
      <p class="text-secondary small mb-4">調査を開始する前に、あなたの調査者名を入力してください。</p>
      <form id="login-form">
        <div class="mb-3">
          <input type="text" class="form-control text-center py-2" id="username-input" placeholder="調査者名を入力" required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-gradient-primary w-100 py-2 mt-2">
          ログインして調査開始
        </button>
      </form>
    </div>
  </div>

  <!-- 送信中ローディング画面 -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner-neon mb-3"></div>
    <h5 id="loading-text">GASサーバーへ送信中...</h5>
    <p class="text-secondary small">この処理には数十秒かかる場合があります。閉じずにお待ちください。</p>
  </div>

  <!-- アプリヘッダー -->
  <header class="d-flex justify-content-between align-items-center" style="padding: 10px 16px;">
      <div class="d-flex align-items-center">
        <i class="fa-solid fa-compass text-primary me-2 fs-5"></i>
        <h1>AMAC FR5</h1>
      </div>
    <div class="d-flex align-items-center gap-3">
      <div class="small d-flex align-items-center me-1">
        <span class="status-dot" id="gps-status-dot"></span>
        <span class="text-secondary small fw-bold" id="gps-status-text">GPS Off</span>
      </div>
      <button class="btn btn-sm btn-gradient-primary fw-bold py-2 px-3 d-flex align-items-center gap-1" id="btn-toggle-tracking" style="font-size: 0.9rem; border-radius: 8px;">
        <i class="fa-solid fa-play" id="tracking-icon" style="font-size: 0.8rem;"></i>
        <span id="tracking-btn-text">調査開始</span>
      </button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main>
    
    <!-- TAB 1: マップ画面 -->
    <div id="tab-map" class="app-tab-content active">
      <div id="map-container">
        <!-- マップ描画先 -->
        <div id="map"></div>
        
        <!-- GPS測位ステータスインジケーター（フローティング） -->
        <div id="gps-positioning-indicator" class="glass-panel d-flex align-items-center gap-2" style="
          position: absolute;
          top: 15px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 1000;
          padding: 8px 16px;
          border-radius: 20px;
          box-shadow: 0 4px 16px rgba(15, 23, 42, 0.18);
          font-size: 0.9rem;
          font-weight: bold;
          background: rgba(255, 255, 255, 0.95);
          border: 2px solid var(--accent-warning);
        ">
          <span class="status-dot" style="width: 10px; height: 10px; border-radius: 50%; background-color: #92400e; box-shadow: 0 0 8px #92400e; animation: pulse 1.5s infinite; margin-right: 0; display: inline-block;"></span>
          <span class="text-dark animate-pulse" id="gps-positioning-text">測位中...</span>
        </div>
        
        <!-- マップ上のフローティング操作系 -->
        <div class="map-overlay-controls">
          <div class="map-btn" id="btn-recenter" title="現在地に移動">
            <i class="fa-solid fa-crosshairs"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB 2: 調査フォーム入力画面 -->
    <div id="tab-form" class="app-tab-content container py-3">
      <div class="glass-panel p-4 mb-4">
        <h4 class="mb-3 text-info fw-bold"><i class="fa-solid fa-pen-to-square me-2"></i>現地調査入力</h4>
        
        <!-- 現在位置の表示 (高コントラスト化) -->
        <div class="alert alert-primary py-3 px-3 border border-primary-subtle bg-white mb-4 d-flex justify-content-between align-items-center" style="border-width: 2px !important;">
          <div style="font-size: 1.05rem;">
            <i class="fa-solid fa-location-dot text-primary me-2"></i>
            <span class="fw-bold text-dark">現在位置:</span>
            <span class="ms-2 fw-bold text-primary" id="form-coords">位置情報未取得</span>
          </div>
          <button class="btn btn-sm btn-outline-primary fw-bold py-1 px-3" id="btn-refresh-form-coords" type="button" style="font-size: 0.9rem;">
            <i class="fa-solid fa-arrows-rotate me-1"></i> 位置更新
          </button>
        </div>

        <form id="survey-form">
          <div class="mb-3">
            <label class="form-label" for="spot-category">地点分類 <span class="text-danger">*</span></label>
            <select class="form-select" id="spot-category" required>
              <option value="" disabled selected>分類を選択してください</option>
              <option value="哺乳類">哺乳類</option>
              <option value="鳥類">鳥類</option>
              <option value="両生・爬虫類">両生・爬虫類</option>
              <option value="昆虫類">昆虫類</option>
              <option value="植物・植生">植物・植生</option>
              <option value="人工構造物">人工構造物</option>
              <option value="自然地形">自然地形</option>
              <option value="その他">その他</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label" for="species-name">種名 / 対象物名 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="species-name" placeholder="例: タヌキ、崩壊地など" required autocomplete="off">
          </div>

          <div class="mb-3">
            <label class="form-label" for="info-detail">情報詳細</label>
            <textarea class="form-control" id="info-detail" rows="2" placeholder="行動、状態、周辺環境などの詳細情報を記入" autocomplete="off"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label" for="interview-target">聞き取り対象</label>
            <input type="text" class="form-control" id="interview-target" placeholder="例: 地元住民Aさん、聞き取りなし" autocomplete="off">
          </div>

          <div class="mb-4">
            <label class="form-label d-block">現地写真撮影 <span class="text-secondary">(200KB自動圧縮)</span></label>
            <input type="file" id="camera-input" accept="image/*" capture="environment" class="d-none">
            <div class="photo-capture-wrapper" id="photo-trigger">
              <i class="fa-solid fa-camera fa-2x text-muted mb-2 d-block" id="camera-icon"></i>
              <span class="text-secondary small" id="photo-status">カメラを起動して撮影</span>
              <img id="photo-preview-img" class="photo-preview" src="#" alt="プレビュー">
            </div>
          </div>

          <button type="submit" class="btn btn-gradient-primary w-100 py-3 mt-2">
            <i class="fa-solid fa-plus me-1"></i> フォーム追加 (保存)
          </button>
        </form>
      </div>
    </div>

    <!-- TAB 3: データ管理・送信画面 (ライト高コントラスト化) -->
    <div id="tab-data" class="app-tab-content container py-3">
      <div class="glass-panel p-4 mb-4">
        <h4 class="mb-3 text-primary fw-bold fs-4"><i class="fa-solid fa-database me-2"></i>調査データ管理</h4>
        
        <div class="row g-3 mb-4">
          <div class="col-6">
            <div class="p-3 bg-white rounded border border-primary text-center" style="border-width: 2px !important;">
              <div class="fs-2 fw-bold text-primary" id="survey-count-display">0</div>
              <div class="text-dark fw-bold small">調査データ件数</div>
            </div>
          </div>
          <div class="col-6">
            <div class="p-3 bg-white rounded border border-success text-center" style="border-width: 2px !important;">
              <div class="fs-2 fw-bold text-success" id="track-count-display">0</div>
              <div class="text-dark fw-bold small">トラック軌跡点数</div>
            </div>
          </div>
        </div>

        <hr class="border-secondary my-4">

        <h5 class="text-dark fw-bold mb-3 fs-5">アクション</h5>
        
        <div class="d-grid gap-3">
          <!-- GASへの送信 -->
          <button class="btn btn-gradient-success py-3 d-flex justify-content-between align-items-center" id="btn-submit-gas">
            <span class="fs-5"><i class="fa-solid fa-cloud-arrow-up me-2"></i>Googleクラウドへ送信</span>
            <span class="badge bg-white text-success border border-success fw-bold fs-6" id="btn-submit-badge">0 件</span>
          </button>
        </div>

        <hr class="border-secondary my-4">

        <div class="card bg-white border border-secondary p-3" style="border-width: 2px !important;">
          <h6 class="text-dark fw-bold mb-3 fs-6"><i class="fa-solid fa-user-gear me-2"></i>システム設定・情報</h6>
          <div class="small text-dark mb-2">
            <strong>ログインユーザー:</strong> <span class="text-primary fw-bold ms-1" id="config-username">---</span>
          </div>
          <div class="small text-dark mb-3">
            <strong>IndexedDB 状態:</strong> <span class="text-success fw-bold ms-1"><i class="fa-solid fa-circle-check"></i> 接続済み</span>
          </div>
          <button class="btn btn-sm btn-outline-danger fw-bold w-100 py-2" id="btn-change-user">
            ユーザー名の変更・ログアウト
          </button>
